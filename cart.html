<!DOCTYPE html>
<html>
<head>
<title>Cart - Indimart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2 style="padding:20px;">Your Cart 🛒</h2>

<div id="cart"></div>

<h3 id="total" style="padding:20px;"></h3>

<!-- ✅ NEW BUTTONS -->
<div style="padding:20px;">
  <button onclick="goToPayment()">Proceed to Checkout 💳</button>
  <button onclick="goHome()" style="background:#ef4444;">⬅ Back to Home</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const container = document.getElementById("cart");
let total = 0;

cart.forEach((item,index)=>{
  total += item.price;

  container.innerHTML += `
    <div class="card">
      <img src="${item.image}" style="height:120px;">
      <h3>${item.title}</h3>
      <p>₹${item.price}</p>
      <button onclick="removeItem(${index})">Remove</button>
    </div>
  `;
});

document.getElementById("total").innerText = "Total: ₹" + total;

function removeItem(index){
  cart.splice(index,1);
  localStorage.setItem("cart",JSON.stringify(cart));
  location.reload();
}

/* ✅ NAVIGATION */
function goToPayment(){
  window.location.href = "index.html";
  localStorage.setItem("goPayment", true);
}

function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
